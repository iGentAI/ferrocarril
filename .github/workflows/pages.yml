name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "ferrocarril-wasm/**"
      - "ferrocarril-core/**"
      - "ferrocarril-nn/**"
      - "ferrocarril-dsp/**"
      - "phonesis/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow one concurrent deployment; cancel older runs in favour of newer ones.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: pages-wasm-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            pages-wasm-${{ runner.os }}-

      - name: Install wasm-bindgen-cli (pinned to crate dep version)
        run: |
          set -e
          # Must match the version pinned in ferrocarril-wasm/Cargo.toml.
          cargo install wasm-bindgen-cli --version 0.2.100 --locked
          wasm-bindgen --version

      - name: Build ferrocarril-wasm demo
        run: |
          chmod +x ferrocarril-wasm/demo/build.sh
          ferrocarril-wasm/demo/build.sh

      - name: Assemble Pages site
        env:
          GH_TOKEN: ${{ github.token }}
          FERROCARRIL_WEIGHTS_URL: ${{ vars.FERROCARRIL_WEIGHTS_URL }}
          FERROCARRIL_WEIGHTS_LAYOUT: ${{ vars.FERROCARRIL_WEIGHTS_LAYOUT }}
        run: |
          set -e
          SITE_DIR=site
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"
          cp ferrocarril-wasm/demo/index.html "$SITE_DIR/index.html"
          cp ferrocarril-wasm/demo/main.js    "$SITE_DIR/main.js"
          cp -r ferrocarril-wasm/demo/pkg     "$SITE_DIR/pkg"

          # Default hosting strategy: download the weights.tar produced
          # by the release-weights workflow into the Pages artifact
          # itself, so visitors fetch it same-origin from the Pages CDN.
          #
          # Why not fetch cross-origin from the GH Release directly?
          # `https://github.com/<repo>/releases/download/<tag>/weights.tar`
          # is a 302 redirect to `release-assets.githubusercontent.com`
          # and neither hop sends `Access-Control-Allow-Origin`. A
          # browser fetch from `https://<owner>.github.io` is therefore
          # blocked by CORS before the redirect is even followed. The
          # cleanest fix is to pull the tar into the Pages artifact and
          # serve it from the same origin as the HTML/JS.
          #
          # Cost: ~340 MB added to the Pages artifact per deploy; Pages
          # soft limits are 1 GB site / 100 GB bandwidth per month, so
          # this accommodates ~290 cold visitors/month before tripping
          # the bandwidth cap. Users who want a larger audience can set
          # the FERROCARRIL_WEIGHTS_URL repo variable to an external
          # CORS-enabled host (Hugging Face Hub, Cloudflare R2, ...) to
          # bypass this step entirely.
          if [[ -z "${FERROCARRIL_WEIGHTS_URL:-}" ]]; then
              WEIGHTS_URL="./"
              WEIGHTS_LAYOUT="tar"
              echo "Default hosting: same-origin Pages artifact."

              if gh release view latest-weights \
                      --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                  echo "Downloading weights.tar from latest-weights release..."
                  gh release download latest-weights \
                      --repo "$GITHUB_REPOSITORY" \
                      --pattern weights.tar \
                      --dir "$SITE_DIR"
                  ls -lh "$SITE_DIR/weights.tar"
              else
                  echo ""
                  echo "WARNING: no 'latest-weights' release found in $GITHUB_REPOSITORY."
                  echo "Pages will deploy without weights.tar; the demo Load button"
                  echo "will 404 on weights.tar until you dispatch the"
                  echo "'Publish weight blobs to GH Release' workflow."
                  echo ""
              fi
          else
              WEIGHTS_URL="$FERROCARRIL_WEIGHTS_URL"
              if [[ -n "${FERROCARRIL_WEIGHTS_LAYOUT:-}" ]]; then
                  WEIGHTS_LAYOUT="$FERROCARRIL_WEIGHTS_LAYOUT"
              elif printf '%s' "$WEIGHTS_URL" | grep -q '/releases/download/'; then
                  WEIGHTS_LAYOUT="tar"
              else
                  WEIGHTS_LAYOUT="nested"
              fi
              echo "External hosting: $WEIGHTS_URL (layout=$WEIGHTS_LAYOUT)"
          fi

          echo "=============================================="
          echo " Ferrocarril Pages deploy"
          echo " Weights URL    : $WEIGHTS_URL"
          echo " Weights layout : $WEIGHTS_LAYOUT"
          echo "=============================================="

          # Substitute the two meta tags. Using python so we don't
          # have to worry about sed regex escaping of slashes or
          # ampersands in URLs.
          python3 - "$SITE_DIR/index.html" "$WEIGHTS_URL" "$WEIGHTS_LAYOUT" <<'PY'
          import sys, re
          path, url, layout = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(path, "r", encoding="utf-8") as f:
              html = f.read()

          def replace_meta(html, name, value):
              pattern = (
                  r'(<meta[^>]*name="'
                  + re.escape(name)
                  + r'"[^>]*content=")[^"]*(")'
              )
              new_html, count = re.subn(
                  pattern,
                  lambda m: m.group(1) + value + m.group(2),
                  html,
                  count=1,
              )
              if count == 0:
                  raise SystemExit(f"meta tag '{name}' not found in {path}")
              return new_html

          html = replace_meta(html, "ferrocarril-weights-url", url)
          html = replace_meta(html, "ferrocarril-weights-layout", layout)

          with open(path, "w", encoding="utf-8") as f:
              f.write(html)
          print(f"Wrote weights URL '{url}' and layout '{layout}' into {path}")
          PY

          # A plain .nojekyll so GH Pages doesn't try to run Jekyll on
          # the artefact.
          touch "$SITE_DIR/.nojekyll"

          du -sh "$SITE_DIR"
          ls -l "$SITE_DIR"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4