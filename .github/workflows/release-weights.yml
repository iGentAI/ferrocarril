name: Publish weight blobs to GH Release

on:
  workflow_dispatch:
    inputs:
      hf_repo:
        description: "HuggingFace repo id to convert (e.g. hexgrad/Kokoro-82M)"
        required: true
        default: "hexgrad/Kokoro-82M"
      release_tag:
        description: "GitHub Release tag to upload into"
        required: true
        default: "latest-weights"

permissions:
  contents: write

jobs:
  convert-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          set -e
          python3 -m pip install --upgrade pip
          python3 -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python3 -m pip install huggingface_hub numpy

      - name: Run weight_converter.py
        env:
          HF_HUB_DOWNLOAD_TIMEOUT: "300"
        run: |
          set -e
          python3 weight_converter.py \
              --huggingface "${{ github.event.inputs.hf_repo }}" \
              --output ferrocarril_weights
          echo "--- summary ---"
          du -sh ferrocarril_weights
          find ferrocarril_weights -name '*.bin' | wc -l

      - name: Pack weights into a single tar
        run: |
          set -e
          # One single asset for the release. The demo's `tar` layout
          # streams this down with progress tracking, parses it inline
          # with a ~60-line USTAR reader, and feeds every blob to the
          # WasmFerroModelBuilder. Using tar instead of per-file assets
          # avoids GitHub's 500 content-creation requests/hour secondary
          # rate limit on release asset uploads (which the prior version
          # of this workflow hit mid-upload of the 605-file batch) and
          # also cuts the demo's cold-load HTTP round-trip count from
          # ~75 (at concurrency 12) to 1.
          tar -cf weights.tar -C ferrocarril_weights .
          ls -lh weights.tar
          echo "--- tar entry count ---"
          tar -tf weights.tar | wc -l

      - name: Publish to GitHub Release (via gh CLI)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.release_tag }}
          HF_REPO: ${{ github.event.inputs.hf_repo }}
        run: |
          set -e

          # Idempotency: delete any existing release with the same tag
          # (and any partial assets left over from a previously failed
          # run) before recreating it fresh. `|| true` so the first-time
          # run doesn't fail on the delete step.
          echo "Deleting existing release '$TAG' (if any)..."
          gh release delete "$TAG" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

          # Write release notes to a temp file so we don't have to
          # escape shell metacharacters in --notes.
          cat > release_notes.md <<MARKDOWN
          Converted Kokoro-82M weights for the
          [iGentAI/ferrocarril](https://github.com/iGentAI/ferrocarril)
          in-browser TTS demo.

          - Source: \`$HF_REPO\`
          - Converter: \`weight_converter.py\` at commit $GITHUB_SHA
          - License: Apache-2.0 (upstream)

          This release contains a single \`weights.tar\` asset that packs
          every per-tensor \`.bin\` blob plus the three JSON metadata
          files. The demo's \`tar\` layout streams this archive down with
          progress tracking and parses it inline with a USTAR reader, so
          a visitor makes exactly one HTTP request to load the full
          ~340 MB model instead of 600+ round trips.

          This release is marked as a prerelease so it does not take
          over the repository homepage.
          MARKDOWN

          echo "Creating release '$TAG' with weights.tar..."
          gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Kokoro-82M converted weights" \
              --notes-file release_notes.md \
              --prerelease \
              --latest=false \
              weights.tar

          echo "--- final release state ---"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY"